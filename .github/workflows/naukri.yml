name: Naukri Auto Resume Update

on:
  schedule:
    - cron: "45 2 * * *"   # 8:15 AM IST (IST = UTC+5:30, so 8:15 AM IST = 2:45 AM UTC)
    - cron: "30 10 * * *"  # 4:00 PM IST (4:00 PM IST = 10:30 AM UTC)
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  update-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install selenium webdriver-manager

      - name: Install Google Chrome
        run: |
          sudo apt-get update -q
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Run Naukri bot
        env:
          NAUKRI_EMAIL:       ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD:    ${{ secrets.NAUKRI_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python naukri_bot.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 5
